version: '3.8'

services:
  mysql-mailcow:
    image: mariadb:10.11
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DBROOT}
      - MYSQL_DATABASE=${DBNAME}
      - MYSQL_USER=${DBUSER}
      - MYSQL_PASSWORD=${DBPASS}
      - TZ=${TZ}
    volumes:
      - mysql-vol:/var/lib/mysql
    networks:
      mailcow-network:

  redis-mailcow:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDISPASS}"]
    volumes:
      - redis-vol:/data
    networks:
      mailcow-network:

  rspamd-mailcow:
    image: mailcow/rspamd:latest
    restart: always
    depends_on:
      - redis-mailcow
    environment:
      - TZ=${TZ}
    networks:
      mailcow-network:

  postfix-mailcow:
    image: mailcow/postfix:latest
    restart: always
    depends_on:
      - mysql-mailcow
      - redis-mailcow
    environment:
      - TZ=${TZ}
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    networks:
      mailcow-network:

  dovecot-mailcow:
    image: mailcow/dovecot:latest
    restart: always
    depends_on:
      - mysql-mailcow
    environment:
      - TZ=${TZ}
    ports:
      - "993:993"
      - "995:995"
    networks:
      mailcow-network:

  sogo-mailcow:
    image: mailcow/sogo:latest
    restart: always
    depends_on:
      - dovecot-mailcow
      - mysql-mailcow
    environment:
      - TZ=${TZ}
    networks:
      mailcow-network:

  nginx-mailcow:
    image: mailcow/nginx:latest
    restart: always
    depends_on:
      - postfix-mailcow
      - dovecot-mailcow
      - rspamd-mailcow
    environment:
      - TZ=${TZ}
      - ADDITIONAL_SAN=${ADDITIONAL_SAN}
      - MAILCOW_HOSTNAME=${MAILCOW_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - mailcow-vol:/var/lib/mailcow
      - ssl-vol:/etc/ssl/mail
    networks:
      mailcow-network:

volumes:
  mysql-vol:
  redis-vol:
  mailcow-vol:
  ssl-vol:

networks:
  mailcow-network:
    driver: bridge
    ipam:
      config:
        # Use a subnet likely to not conflict with defaults
        - subnet: 172.40.20.0/24
